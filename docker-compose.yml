services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ingest
    ports: ["5432:5432"]
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
  redis:
    image: redis:7
    ports: ["6379:6379"]
  api:
    build: .
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ingest
    ports: ["8000:8000"]
    depends_on: [postgres]
  relay:
    build: .
    command: python -m app.relay
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ingest
      REDIS_URL: redis://redis:6379/0
    depends_on: [postgres, redis]
  worker:
    build: .
    command: python -m app.worker
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ingest
      REDIS_URL: redis://redis:6379/0
    depends_on: [postgres, redis]
